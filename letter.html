<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="main.css">
<title>forever me and you 💖</title>
</head>

<body class="bg-pink-100 min-h-screen flex items-center justify-center px-4">

<!-- Card -->
<div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-md text-center">

  <p id="text" class="text-sm md:text-base leading-relaxed text-gray-700"></p>

  <button onclick="goQuiz()" 
    class="mt-6 bg-pink-400 hover:bg-pink-500 text-white px-6 py-2 rounded-xl w-full md:w-auto transition">
    อาเคค 💖
  </button>

</div>

<!-- Music -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const msg = `Happy Anniversary นะค้าบบ มะมี๊ ปะปี๊รักมะมี๊ มากๆเลยนะคะ อยู่กับเค้าไปนานๆน้าา ห้ามทึ้งเค้าไปไหนทั้งนั้นน เค้ารักเทอมากๆนะคะ จุ๊บๆ ฟานรักเฟิร์นมากๆนะ ไหนๆ ล่ะ นานๆ ที่จะทำอะไรแบบนี้ให้ เค้า ขอถามคำถามหน่อยล่ะกัน ตอบให้ถูกล่ะไม่งั้นเค้าคงเสียใจแย่ ตอบใด้ครั้งเดียวนะะ ห้ามตอบผิดนะะะ ไปแล้วบะบุยยย เค้ารักแกมากๆนะคะ`;

let i = 0;
const textEl = document.getElementById('text');

function type(){
  if(i < msg.length){
    textEl.innerHTML += msg[i];
    i++;
    setTimeout(type, 20);
  }
}
type();

// 🔥 แก้ autoplay บนมือถือ
const audio = document.getElementById("bgm");
document.body.addEventListener("click", () => {
  audio.play().catch(()=>{});
}, { once: true });

function goQuiz(){ 
  location.href='quiz.html'; 
}
</script>

</body>
</html>
