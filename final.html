<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="main.css">
<title>forever me and you 💖</title>
</head>

<body class="bg-pink-200 min-h-screen flex flex-col items-center justify-center text-center px-4 overflow-hidden">

<!-- ❤️ Content -->
<h1 class="text-2xl md:text-4xl font-bold mb-6 z-10 animate-pulse">
  รักนะ อยู่ด้วยกันไปนานๆเลยนะ ❤️
</h1>

<img src="IMG_4610.jpg" 
  class="w-48 md:w-64 rounded-2xl shadow-2xl mb-6 z-10">

<button onclick="location.href='index.html'" 
  class="bg-white hover:bg-gray-100 px-6 py-3 rounded-xl shadow z-10 transition">
  เล่นอีกครั้ง 🔁
</button>

<!-- 💖 Heart Rain -->
<script>
setInterval(()=>{
  let c = document.createElement('div');
  c.innerText='💖';
  c.style.position='fixed';
  c.style.left=Math.random()*100+'vw';
  c.style.top='-20px';
  c.style.fontSize = (16 + Math.random()*20) + 'px';
  c.style.opacity = Math.random();
  document.body.appendChild(c);

  let y=0;
  let speed = 2 + Math.random()*3;

  const fall=setInterval(()=>{
    y+=speed;
    c.style.top=y+'px';

    if(y>innerHeight){
      clearInterval(fall);
      c.remove();
    }
  },30);
},150);
</script>

<!-- 🎵 Music -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// autoplay fix
const audio = document.getElementById("bgm");
document.body.addEventListener("click", () => {
  audio.play().catch(()=>{});
}, { once: true });
</script>

</body>
</html>
