<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="main.css">
        <title>forever me and you 💖</title>
        <style>
            body { overflow: hidden; }
            .glow { box-shadow: 0 0 20px pink; }
        </style>
    </head>
<body class="bg-gradient-to-r from-pink-200 to-pink-400 flex items-center justify-center h-screen">

    <audio autoplay loop>
    <source src="music.mp4" type="audio/mpeg">
    </audio>

    <div id="intro" class="text-white text-3xl">กำลังโหลดความรัก... 💖</div>

    <div id="main" class="hidden bg-white p-8 rounded-2xl shadow-xl text-center glow">
        <h1 class="text-2xl mb-4">ใส่รหัสลับ 💌</h1>
        <input id="code" maxlength="6" class="border p-2 text-center rounded-lg" />
        <p id="error" class="text-red-500 mt-2 hidden">รหัสไม่ถูกนะ ลืมหรอ 🥺</p>
        <p id="hint" class="text-pink-400 mt-2 hidden">คำใบ้: วันครบรอบของเราสองคน 💖</p>
    </div>

    <script>
        setTimeout(()=>{
            document.getElementById('intro').style.display='none';
            document.getElementById('main').classList.remove('hidden');
        },2000);

        const correct = "200968";
        const input = document.getElementById('code');

        input.addEventListener('keyup', () => {
            if (input.value.length === 6) {
                if (input.value === correct) {
                    window.location.href = 'main.html';
                } else {
                    error.classList.remove('hidden');
                    hint.classList.remove('hidden');
                }
            }
        });
    </script>
</body>
</html>
