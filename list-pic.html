<script>
const cards = document.querySelectorAll('.card');
const bg = document.getElementById('bg');
let current = 0;
let startX = 0;
let currentX = 0;
let isDragging = false;

function updateBG() {
  bg.style.backgroundImage = `url(${cards[current].src})`;
}
updateBG();


function setTopCard() {
  cards.forEach((c, i) => {
    c.style.zIndex = cards.length - i;
  });
}
setTopCard();

function handleStart(e) {
  isDragging = true;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
}

function handleMove(e) {
  if (!isDragging) return;
  currentX = e.touches ? e.touches[0].clientX : e.clientX;
  let diff = currentX - startX;

  const card = cards[current];
  card.style.transform = `translateX(${diff}px) rotate(${diff/10}deg)`;
}

function handleEnd() {
  if (!isDragging) return;
  isDragging = false;

  let diff = currentX - startX;
  const card = cards[current];

  if (Math.abs(diff) > 100) {
    card.style.transition = '0.3s';
    card.style.transform = `translateX(${diff > 0 ? 500 : -500}px) rotate(${diff/10}deg)`;

    setTimeout(() => {
      card.style.display = 'none';
      current++;
      if (current >= cards.length) current = 0;
      resetCards();
    }, 300);
  } else {
    // reset
    card.style.transition = '0.3s';
    card.style.transform = '';
  }
}

function resetCards() {
  cards.forEach(c => {
    c.style.transform = '';
    c.style.transition = '';
  });
}

cards.forEach(card => {
  card.addEventListener('mousedown', handleStart);
  card.addEventListener('mousemove', handleMove);
  card.addEventListener('mouseup', handleEnd);

  card.addEventListener('touchstart', handleStart);
  card.addEventListener('touchmove', handleMove);
  card.addEventListener('touchend', handleEnd);
});
</script>
